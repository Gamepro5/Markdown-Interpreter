<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d333b"/>
      <stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" ry="80" fill="none" stroke="#444c56" stroke-width="4"/>
  <!-- MD text -->
  <text x="256" y="355" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700" font-size="240" fill="#e6edf3" letter-spacing="-10" transform="scale(1, 1.4) translate(0, -75)">MD</text>
</svg>
